name: ci
on: [push, pull_request]
jobs:
  go:      { uses: gooral/ci-workflows/.gitea/workflows/go-quality.yml@main }
  yaml:    { uses: gooral/ci-workflows/.gitea/workflows/yaml-quality.yml@main }
  dup:     { uses: gooral/ci-workflows/.gitea/workflows/duplication.yml@main }
  secrets: { uses: gooral/ci-workflows/.gitea/workflows/secrets-scan.yml@main }
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go install golang.org/x/tools/cmd/goimports@latest
      - run: pip install pre-commit
      - run: pre-commit run --all-files
